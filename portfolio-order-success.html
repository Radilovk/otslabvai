<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поръчката е приета – Portfolio</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="portfolio.css">
</head>
<body class="pf-body">
    <div id="pf-header-slot"></div>
    <main class="pf-success-page">
        <div class="pf-success-card pf-card">
            <div class="pf-success-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5 9.5 18 20 6"/></svg></div>
            <h1>Поръчката е приета!</h1>
            <p class="pf-lead" id="success-message">Благодарим ви. Ще се свържем с вас за потвърждение.</p>
            <div class="pf-order-id-box">
                <span>Номер на поръчка</span>
                <strong id="order-id">—</strong>
            </div>
            <ul class="pf-success-steps">
                <li><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5" y="4" width="14" height="17" rx="2"/><rect x="8.5" y="2" width="7" height="4" rx="1.2"/><path d="M8.5 11h7M8.5 15h7"/></svg><span>Поръчката се преглежда от екипа</span></li>
                <li><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9.5"/><path d="m7.5 12.5 3 3 6-6.5"/></svg><span>Получавате потвърждение по телефон</span></li>
                <li><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2.5 22 8v8l-10 5.5L2 16V8z"/><path d="M2 8l10 5.5L22 8"/><path d="M12 13.5V22"/></svg><span>Изпращане след одобрение</span></li>
            </ul>
            <a href="portfolio.html" class="pf-btn pf-btn-primary">Продължи пазаруването</a>
        </div>
    </main>
    <div id="pf-footer-slot"></div>
    <script type="module">
        import { initPortfolioPage } from './portfolio-shared.js';

        await initPortfolioPage();
        const params = new URLSearchParams(location.search);
        const id = params.get('id');
        let order = null;
        try {
            order = JSON.parse(sessionStorage.getItem('pf_last_order') || 'null');
        } catch {}

        if (id) document.getElementById('order-id').textContent = id;
        else if (order?.id) document.getElementById('order-id').textContent = order.id;

        if (order?.customer?.firstName) {
            document.getElementById('success-message').textContent =
                `${order.customer.firstName}, благодарим! Ще се обадим на ${order.customer.phone || 'посочения телефон'} за потвърждение.`;
        }
    </script>
</body>
</html>
