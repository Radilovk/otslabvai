name = "port-worker"
main = "worker.js"
compatibility_date = "2024-04-05"

# Static HTML/JS/CSS files are bundled from the repo at deploy time and served
# directly by the Cloudflare edge — they never touch the Worker or KV.
# Only API routes (/page_content.json, /orders, /contacts, etc.) hit the Worker.
[assets]
directory = "."

# KV пространствата съхраняват поръчките и съдържанието на сайта.
[[kv_namespaces]]
binding = "ORDERS"
# Идентификаторите са добавени след създаване на namespace
id = "b2891ffe523048ae87cf9c4549d6ab49"
preview_id = "b2891ffe523048ae87cf9c4549d6ab49"

[[kv_namespaces]]
binding = "PAGE_CONTENT"
id = "d220db696e414b7cb3da2b19abd53d0f"
preview_id = "d220db696e414b7cb3da2b19abd53d0f"

# Refresh the Speedy offices KV cache once a day at 03:00 UTC.
[triggers]
crons = ["0 3 * * *"]
