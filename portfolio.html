<!DOCTYPE html>
<html lang="bg" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio – Каталог хранителни добавки</title>
    <meta name="description" content="Пълен каталог хранителни добавки – протеини, витамини, аминокиселини и още.">
    <meta name="robots" content="index, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="portfolio.css">
</head>
<body class="pf-body">
    <div id="sync-banner" class="pf-sync-banner" style="display:none;"></div>

    <header class="pf-header">
        <div class="pf-header-inner">
            <a href="portfolio.html" class="pf-logo">
                <div class="pf-logo-icon">P</div>
                <div>
                    <span class="pf-logo-text" id="site-name">Portfolio</span>
                    <span class="pf-logo-slogan" id="site-slogan">Пълен каталог хранителни добавки</span>
                </div>
            </a>
            <div class="pf-search-wrap">
                <svg class="pf-search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="search" id="search-input" placeholder="Търси продукт, марка..." aria-label="Търсене">
            </div>
            <div class="pf-header-actions">
                <a href="portfolio-checkout.html" class="pf-cart-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                    Количка
                    <span class="pf-cart-badge" id="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <div class="pf-layout">
        <button type="button" class="pf-filters-toggle" id="filters-toggle">Филтри ▼</button>

        <aside class="pf-sidebar" id="sidebar">
            <div class="pf-filter-group">
                <h3>Категория</h3>
                <select id="filter-category">
                    <option value="">Всички категории</option>
                </select>
            </div>
            <div class="pf-filter-group">
                <h3>Марка</h3>
                <select id="filter-brand">
                    <option value="">Всички марки</option>
                </select>
            </div>
            <div class="pf-filter-group">
                <h3>Цена (€)</h3>
                <div style="display:flex;gap:0.5rem;">
                    <input type="number" id="filter-min-price" placeholder="От" min="0" step="0.01">
                    <input type="number" id="filter-max-price" placeholder="До" min="0" step="0.01">
                </div>
            </div>
            <div class="pf-filter-group">
                <label class="pf-checkbox-label">
                    <input type="checkbox" id="filter-available" checked>
                    Само налични
                </label>
            </div>
            <button type="button" class="pf-btn-clear" id="clear-filters">Изчисти филтрите</button>
        </aside>

        <main>
            <div class="pf-main-header">
                <div>
                    <h1>Каталог</h1>
                    <p class="pf-results-meta" id="results-meta">Зареждане...</p>
                </div>
                <div class="pf-sort">
                    <select id="sort-select" aria-label="Сортиране">
                        <option value="name">Име А–Я</option>
                        <option value="brand">Марка</option>
                        <option value="price_asc">Цена ↑</option>
                        <option value="price_desc">Цена ↓</option>
                    </select>
                </div>
            </div>
            <div id="catalog-grid" class="pf-grid">
                <div class="pf-loading">Зареждане на каталога...</div>
            </div>
            <nav class="pf-pagination" id="pagination" aria-label="Странициране"></nav>
        </main>
    </div>

    <div class="pf-toast-container" id="toast-container"></div>
    <script type="module" src="portfolio.js"></script>
</body>
</html>
