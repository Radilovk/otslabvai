<!DOCTYPE html>
<html lang="bg" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f2540">
    <script>
    (function(){try{var s=localStorage.getItem('theme');var t=s||(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();
    </script>
    <title>BIOCODE – Nutrition Science | Каталог хранителни добавки</title>
    <meta name="description" content="BIOCODE Nutrition Science – протеини, витамини, аминокиселини с доставка до офис.">
    <meta name="robots" content="index, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/biocode-favicon.png">
    <link rel="stylesheet" href="portfolio.css">
</head>
<body class="pf-body">
    <div id="sync-banner" class="pf-sync-banner" style="display:none;" role="alert"></div>

    <div id="pf-header-slot"></div>

    <section class="pf-hero" id="pf-hero">
        <div class="pf-hero-media" aria-hidden="true">
            <img id="hero-image" src="images/portfolio-hero.jpg" alt="" width="1400" height="666" loading="eager" decoding="async" fetchpriority="high">
        </div>
        <div class="pf-hero-overlay" aria-hidden="true"></div>
        <div class="pf-hero-inner">
            <div class="pf-hero-badges">
                <span class="pf-hero-badge"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="1.5" y="4.5" width="21" height="15" rx="2.5"/><path d="M1.5 9.5h21"/><path d="M5 15h4"/></svg>Наложен платеж</span>
                <span class="pf-hero-badge"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1.5 6.5h11v10h-11z"/><path d="M12.5 10h4.5l4 3.5v3h-8.5z"/><circle cx="6" cy="18.5" r="2"/><circle cx="17.5" cy="18.5" r="2"/></svg>Доставка до офис</span>
                <span class="pf-hero-badge"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2 4 5v6c0 5 3.4 8.6 8 11 4.6-2.4 8-6 8-11V5z"/><path d="m8.5 12 2.5 2.5 4.5-5"/></svg>Оригинални продукти</span>
            </div>
            <h1 id="hero-title">Каталог добавки</h1>
            <p id="hero-subtitle">Протеини, витамини, аминокиселини и още – с удобна поръчка и доставка до офис.</p>
            <div class="pf-hero-stats" id="hero-stats" style="display:none">
                <div class="pf-hero-stat"><strong id="stat-products">—</strong><span>продуктови групи</span></div>
                <div class="pf-hero-stat"><strong id="stat-brands">—</strong><span>марки</span></div>
            </div>
        </div>
    </section>

    <div class="pf-layout">
        <button type="button" class="pf-filters-toggle" id="filters-toggle" aria-expanded="false" aria-controls="sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M3.5 6.5h17M3.5 12h17M3.5 17.5h17"/></svg>
            <span id="filters-toggle-label">Филтри</span>
        </button>
        <div class="pf-sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

        <aside class="pf-sidebar" id="sidebar" aria-label="Филтри">
            <div class="pf-sidebar-header">
                <h2>Филтри</h2>
                <button type="button" class="pf-sidebar-close" id="sidebar-close" aria-label="Затвори филтрите"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
            </div>
            <div class="pf-filter-group">
                <h3>Цена (€)</h3>
                <div class="pf-filter-price-row">
                    <input type="number" id="filter-min-price" placeholder="От" min="0" step="0.01" aria-label="Минимална цена">
                    <input type="number" id="filter-max-price" placeholder="До" min="0" step="0.01" aria-label="Максимална цена">
                </div>
            </div>
            <button type="button" class="pf-btn-clear" id="clear-filters">Изчисти филтрите</button>
            <button type="button" class="pf-sidebar-apply" id="sidebar-apply">Покажи резултатите</button>
        </aside>

        <main>
            <div class="pf-toolbar">
                <div>
                    <h2>Каталог</h2>
                    <p class="pf-results-meta" id="results-meta">Зареждане...</p>
                </div>
                <div class="pf-sort">
                    <select id="sort-select" aria-label="Сортиране">
                        <option value="relevance">Препоръчани</option>
                        <option value="name">Име А–Я</option>
                        <option value="name_desc">Име Я–А</option>
                        <option value="brand">Марка</option>
                        <option value="price_asc">Цена: ниска към висока</option>
                        <option value="price_desc">Цена: висока към ниска</option>
                    </select>
                </div>
            </div>

            <div class="pf-search-wrap pf-search-wrap--full">
                <svg class="pf-search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="search" id="search-input" placeholder="Търси продукт, марка, категория..." aria-label="Търсене в каталога">
            </div>

            <div class="pf-filter-bar" aria-label="Бързи филтри">
                <div class="pf-filter-field">
                    <label class="pf-filter-label" for="filter-category">Категория</label>
                    <select id="filter-category" class="pf-filter-select" aria-label="Категория">
                        <option value="">Всички категории</option>
                    </select>
                </div>
                <div class="pf-filter-field">
                    <label class="pf-filter-label" for="filter-goal">Цел</label>
                    <select id="filter-goal" class="pf-filter-select" aria-label="Цел на продукта">
                        <option value="">Всички цели</option>
                    </select>
                </div>
                <div class="pf-filter-field pf-filter-field--brand">
                    <label class="pf-filter-label" for="filter-brand">Марка</label>
                    <select id="filter-brand" class="pf-filter-select" aria-label="Марка">
                        <option value="">Всички марки</option>
                    </select>
                </div>
            </div>
            <div class="pf-active-filters" id="active-filters" aria-live="polite"></div>

            <div id="catalog-grid" class="pf-grid" aria-live="polite">
                <div class="pf-skeleton"></div>
                <div class="pf-skeleton"></div>
                <div class="pf-skeleton"></div>
                <div class="pf-skeleton"></div>
            </div>
            <nav class="pf-pagination" id="pagination" aria-label="Странициране"></nav>
        </main>
    </div>

    <div id="pf-footer-slot"></div>
    <div id="pf-mobile-cart-slot"></div>
    <div class="pf-toast-container" id="toast-container"></div>
    <script type="module" src="portfolio.js"></script>
</body>
</html>
