name: Sync Speedy Offices

# Runs daily at 02:00 UTC (before the Worker cron at 03:00 UTC).
# Can also be triggered manually from the GitHub Actions UI or via workflow_dispatch API
# (the admin panel's "Синхронизирай офисите" button does this automatically).
#
# Uses Speedy's PUBLIC widget endpoint — NO API key or password required.
# Endpoint: https://services.speedy.bg/office_locator_widget_v3/offices_list.php?lang=bg
# Returns a JSON array of offices with fields: id, name, address, city
#
# Only secret required: CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID (existing deployment secrets).
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

# KV namespace ID for PAGE_CONTENT (from wrangler.toml — not a secret).
env:
  CF_KV_NAMESPACE_ID: d220db696e414b7cb3da2b19abd53d0f
  CF_KV_KEY: speedy_offices_cache

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}

    steps:
      - name: Fetch Speedy offices (public widget endpoint)
        run: |
          HTTP_STATUS=$(curl -s -o offices_raw.json -w "%{http_code}" \
            -H "Accept: application/json" \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            "https://services.speedy.bg/office_locator_widget_v3/offices_list.php?lang=bg")

          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Speedy offices endpoint returned HTTP $HTTP_STATUS"
            cat offices_raw.json || true
            exit 1
          fi

          OFFICE_COUNT=$(python3 -c "
          import json
          with open('offices_raw.json') as f:
              raw = json.load(f)
          items = raw if isinstance(raw, list) else raw.get('offices', [])
          print(len(items))
          ")
          echo "Fetched $OFFICE_COUNT offices from Speedy"

      - name: Normalize offices
        run: |
          python3 - <<'EOF'
          import json

          with open('offices_raw.json', 'r', encoding='utf-8') as f:
              raw = json.load(f)

          # Widget endpoint returns a plain JSON array; each item already has
          # flat fields: id, name, address, city
          items = raw if isinstance(raw, list) else raw.get('offices', [])

          offices = []
          for o in items:
              if not isinstance(o, dict):
                  continue
              # Support both flat (widget) and nested (api.speedy.bg) response shapes
              addr = o.get('address')
              if isinstance(addr, dict):
                  address_str = str(addr.get('localAddressString') or addr.get('fullAddressString') or '')
                  city_str = str(addr.get('siteName') or addr.get('city') or '')
              else:
                  address_str = str(addr or '')
                  city_str = str(o.get('city') or '')
              offices.append({
                  'id': o.get('id'),
                  'name': str(o.get('name') or ''),
                  'address': address_str,
                  'city': city_str
              })

          with open('offices_normalized.json', 'w', encoding='utf-8') as f:
              json.dump(offices, f, ensure_ascii=False)

          print(f"Normalized {len(offices)} offices")
          EOF

      - name: Write to Cloudflare KV
        run: |
          HTTP_STATUS=$(curl -s -o cf_response.json -w "%{http_code}" \
            -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/${CF_KV_KEY}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-binary @offices_normalized.json)

          echo "Cloudflare KV response (HTTP $HTTP_STATUS):"
          cat cf_response.json

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Cloudflare KV write failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          SUCCESS=$(python3 -c "
          import json
          with open('cf_response.json') as f:
              r = json.load(f)
          print('yes' if r.get('success') else 'no')
          ")
          if [ "$SUCCESS" != "yes" ]; then
            echo "ERROR: Cloudflare KV API returned success=false"
            exit 1
          fi

          echo "✓ Speedy offices written to KV successfully"
