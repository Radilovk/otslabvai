name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    permissions:
      contents: write  # Required to commit baked bio.html back to repo
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # Use GitHub token for push access

      - name: Bake bio_content.json into bio.html
        run: |
          python3 - <<'PYEOF'
          import json
          with open('bio_content.json', encoding='utf-8') as f:
              content = json.load(f)
          with open('bio.html', encoding='utf-8') as f:
              html = f.read()
          START = '<!-- __BIO_CONTENT_BAKED_START__ -->'
          END   = '<!-- __BIO_CONTENT_BAKED_END__ -->'
          safe_json = json.dumps(content, ensure_ascii=False, separators=(',', ':')).replace('</script>', r'<\/script>')
          block = f'{START}\n<script>window.__BAKED_BIO_CONTENT__={safe_json};</script>\n{END}'
          si = html.find(START)
          ei = html.find(END)
          if si == -1 or ei == -1:
              print('ERROR: bake markers not found in bio.html — skipping bake')
              exit(0)
          ei = ei + len(END)
          with open('bio.html', 'w', encoding='utf-8') as f:
              f.write(html[:si] + block + html[ei:])
          print('bio_content.json baked into bio.html successfully')
          PYEOF

      - name: Commit baked bio.html back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet bio.html; then
            echo "No changes to bio.html"
          else
            git add bio.html
            git commit -m "build: bake bio_content.json into bio.html [skip ci]"
            git push
            echo "✅ Baked bio.html committed to repo"
          fi

      - name: Sync bio_content.json to KV
        run: |
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/storage/kv/namespaces/d220db696e414b7cb3da2b19abd53d0f/values/bio_content" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-binary "@bio_content.json" | python3 -c "import sys,json; r=json.load(sys.stdin); print('KV sync:', 'OK' if r.get('success') else r)"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
