<!DOCTYPE html>
<html lang="bg" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поръчка – Portfolio</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="portfolio.css">
    <style>
        .pf-checkout { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; display: grid; grid-template-columns: 1fr 380px; gap: 2rem; }
        @media (max-width: 800px) { .pf-checkout { grid-template-columns: 1fr; } }
        .pf-checkout-form, .pf-checkout-summary { background: var(--pf-surface); border: 1px solid var(--pf-border); border-radius: var(--pf-radius); padding: 1.5rem; }
        .pf-checkout-summary { position: sticky; top: 5rem; align-self: start; }
        .pf-form-group { margin-bottom: 1rem; }
        .pf-form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.35rem; color: var(--pf-text-muted); }
        .pf-form-group input, .pf-form-group textarea { width: 100%; padding: 0.65rem; border: 1px solid var(--pf-border); border-radius: 8px; background: var(--pf-bg); color: var(--pf-text); font-size: 1rem; }
        .pf-form-group input:focus, .pf-form-group textarea:focus { outline: none; border-color: var(--pf-primary); }
        .pf-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .pf-cart-item { display: flex; gap: 0.75rem; padding: 0.75rem 0; border-bottom: 1px solid var(--pf-border); align-items: center; }
        .pf-cart-item img { width: 56px; height: 56px; object-fit: contain; border-radius: 8px; background: #fff; }
        .pf-cart-item-info { flex: 1; font-size: 0.9rem; }
        .pf-cart-item-price { font-weight: 600; }
        .pf-qty-btn { width: 28px; height: 28px; border: 1px solid var(--pf-border); background: var(--pf-bg); border-radius: 6px; cursor: pointer; }
        .pf-total-row { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 700; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--pf-border); }
        .pf-submit-btn { width: 100%; margin-top: 1rem; padding: 0.9rem; background: var(--pf-primary); color: #fff; border: none; border-radius: var(--pf-radius); font-size: 1rem; font-weight: 600; cursor: pointer; }
        .pf-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .pf-note { font-size: 0.85rem; color: var(--pf-text-muted); margin-top: 1rem; }
        .is-invalid { border-color: #c0392b !important; }
    </style>
</head>
<body class="pf-body">
    <header class="pf-header">
        <div class="pf-header-inner">
            <a href="portfolio.html" class="pf-logo">
                <div class="pf-logo-icon">P</div>
                <div><span class="pf-logo-text">Portfolio</span></div>
            </a>
            <a href="portfolio.html" class="pf-cart-btn" style="background:transparent;color:var(--pf-primary);border:1px solid var(--pf-primary);">← Каталог</a>
        </div>
    </header>

    <div class="pf-checkout">
        <form id="checkout-form" class="pf-checkout-form">
            <h1 style="margin:0 0 1.5rem;font-family:var(--pf-font-display);">Данни за поръчка</h1>
            <p style="color:var(--pf-text-muted);margin-bottom:1.5rem;">Попълнете данните си. Поръчката ще бъде прегледана и потвърдена преди изпращане.</p>

            <div class="pf-form-row">
                <div class="pf-form-group">
                    <label for="firstName">Име *</label>
                    <input type="text" id="firstName" name="firstName" required autocomplete="given-name">
                </div>
                <div class="pf-form-group">
                    <label for="lastName">Фамилия *</label>
                    <input type="text" id="lastName" name="lastName" required autocomplete="family-name">
                </div>
            </div>
            <div class="pf-form-row">
                <div class="pf-form-group">
                    <label for="phone">Телефон *</label>
                    <input type="tel" id="phone" name="phone" required autocomplete="tel">
                </div>
                <div class="pf-form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" autocomplete="email">
                </div>
            </div>
            <div class="pf-form-group">
                <label for="city">Град *</label>
                <input type="text" id="city" name="city" required>
            </div>
            <div class="pf-form-group">
                <label for="address">Адрес / офис на куриер *</label>
                <textarea id="address" name="address" rows="3" required placeholder="Адрес за доставка или име на офис Speedy/Econt"></textarea>
            </div>
            <div class="pf-form-group">
                <label for="notes">Бележка (по избор)</label>
                <textarea id="notes" name="notes" rows="2"></textarea>
            </div>
        </form>

        <aside class="pf-checkout-summary">
            <h2 style="margin:0 0 1rem;font-family:var(--pf-font-display);font-size:1.2rem;">Количка</h2>
            <div id="cart-items"></div>
            <div class="pf-total-row">
                <span>Общо</span>
                <span id="cart-total">0.00 €</span>
            </div>
            <button type="submit" form="checkout-form" class="pf-submit-btn" id="submit-btn">Изпрати поръчка</button>
            <p class="pf-note">След изпращане ще се свържем с вас за потвърждение на поръчката и доставката.</p>
        </aside>
    </div>

    <div class="pf-toast-container" id="toast-container"></div>

    <script type="module">
        import { API_URL } from './config.js';

        const CART_KEY = 'portfolioCart';
        const cartItemsEl = document.getElementById('cart-items');
        const cartTotalEl = document.getElementById('cart-total');
        const form = document.getElementById('checkout-form');
        const submitBtn = document.getElementById('submit-btn');
        const toastContainer = document.getElementById('toast-container');

        let cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]');

        function showToast(msg, type) {
            const el = document.createElement('div');
            el.className = `pf-toast ${type || ''}`;
            el.textContent = msg;
            toastContainer.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        function saveCart() {
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
            renderCart();
        }

        function renderCart() {
            if (!cart.length) {
                cartItemsEl.innerHTML = '<p style="color:var(--pf-text-muted);">Количката е празна. <a href="portfolio.html">Към каталога</a></p>';
                cartTotalEl.textContent = '0.00 €';
                submitBtn.disabled = true;
                return;
            }

            let total = 0;
            cartItemsEl.innerHTML = cart.map((item, idx) => {
                const line = item.price * item.quantity;
                total += line;
                return `
                <div class="pf-cart-item" data-idx="${idx}">
                    ${item.image ? `<img src="${item.image}" alt="">` : ''}
                    <div class="pf-cart-item-info">
                        <div>${item.name}</div>
                        <div style="display:flex;align-items:center;gap:0.5rem;margin-top:0.35rem;">
                            <button type="button" class="pf-qty-btn" data-action="minus" data-idx="${idx}">−</button>
                            <span>${item.quantity}</span>
                            <button type="button" class="pf-qty-btn" data-action="plus" data-idx="${idx}">+</button>
                            <button type="button" class="pf-qty-btn" data-action="remove" data-idx="${idx}" style="margin-left:auto;color:#c0392b;">✕</button>
                        </div>
                    </div>
                    <div class="pf-cart-item-price">${line.toFixed(2)} €</div>
                </div>`;
            }).join('');

            cartTotalEl.textContent = `${total.toFixed(2)} €`;
            submitBtn.disabled = false;

            cartItemsEl.querySelectorAll('.pf-qty-btn').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const i = parseInt(btn.dataset.idx, 10);
                    const action = btn.dataset.action;
                    if (action === 'plus') cart[i].quantity++;
                    else if (action === 'minus') {
                        cart[i].quantity--;
                        if (cart[i].quantity <= 0) cart.splice(i, 1);
                    } else if (action === 'remove') cart.splice(i, 1);
                    saveCart();
                });
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!cart.length) return;

            const required = ['firstName', 'lastName', 'phone', 'city', 'address'];
            let valid = true;
            required.forEach((id) => {
                const el = document.getElementById(id);
                if (!el.value.trim()) { el.classList.add('is-invalid'); valid = false; }
                else el.classList.remove('is-invalid');
            });
            if (!valid) { showToast('Моля, попълнете задължителните полета.', 'error'); return; }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Изпращане...';

            const formData = Object.fromEntries(new FormData(form));
            const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);

            try {
                const res = await fetch(`${API_URL}/portfolio/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customer: formData,
                        products: cart,
                        summary: { total: `${total.toFixed(2)} €` }
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Грешка');

                localStorage.removeItem(CART_KEY);
                cart = [];
                form.reset();
                renderCart();
                showToast(`Поръчка ${data.order.id} е изпратена успешно!`, 'success');
                submitBtn.textContent = 'Поръчката е изпратена';
            } catch (err) {
                showToast(err.message || 'Грешка при изпращане.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Изпрати поръчка';
            }
        });

        renderCart();
    </script>
</body>
</html>
