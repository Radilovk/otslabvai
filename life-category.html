<!DOCTYPE html>
<html lang="bg" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="life-header-preinit.js"></script>
    <link rel="icon" type="image/png" href="images/life-icons/logo.png">
    <title>Категория - Life Protocols</title>
    <meta name="description" content="Пълен каталог от продукти в категорията. Life Protocols — биохакинг протоколи и хранителни добавки.">
    <meta name="robots" content="index, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="preload" as="image" href="images/life-icons/logo.png" type="image/png">
    <link rel="stylesheet" href="life.css?v=20260713e">
    <link rel="stylesheet" href="catalog.css">
</head>
<body data-site="life">
    <a href="#main-content-container" class="skip-link">Прескочи към основното съдържание</a>

    <header class="main-header">
        <div class="header-container">
            <a href="life.html" class="logo-container" id="header-logo-link">
                <img src="images/life-icons/logo.png" alt="Life Protocols Лого" id="header-logo-img" style="display: block;">
                <div>
                    <span class="brand-name" id="header-brand-name">Life Protocols</span>
                    <span class="brand-slogan" id="header-brand-slogan" style="display: none;"></span>
                </div>
            </a>
            <nav class="main-nav">
                <ul class="nav-links" id="main-nav-links">
                    <li class="cart-link-mobile">
                        <span class="cart-link-mobile-label">Количка</span>
                        <a href="life-checkout.html">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                            </svg>
                            <span>Виж количката</span>
                            <span class="cart-badge" id="cart-count-menu">0</span>
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="header-actions">
                <a href="life-checkout.html" class="cart-icon-btn" aria-label="Количка">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-badge" id="cart-count">0</span>
                </a>
            </div>
            <button class="menu-toggle" aria-label="Toggle Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>
    <div class="nav-overlay"></div>

    <main class="catalog-page">
        <div class="container">
            <div class="catalog-header">
                <a href="life.html" class="catalog-back" id="category-back-link">← Към началната страница</a>
                <h1 id="category-title">Категория</h1>
                <p id="category-description"></p>
            </div>
            <div id="category-grid" class="catalog-grid" aria-live="polite"></div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-grid" id="footer-grid-container"></div>
            <div class="footer-bottom" id="footer-copyright-container"></div>
        </div>
    </footer>

    <div id="toast-container" class="toast-container"></div>
    <button id="back-to-top" class="back-to-top" aria-label="Нагоре">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </button>

    <script type="module" src="catalog-page.js"></script>
</body>
</html>
